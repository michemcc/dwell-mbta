[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# ── SPA fallback ──────────────────────────────────────────────────────────────
# Makes React routing work on direct URL access and hard refresh.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security & performance headers ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively — Vite fingerprints them so safe to cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache index.html — so users always get the latest version
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Serve sitemap and robots with correct types
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type  = "text/plain"
    Cache-Control = "public, max-age=86400"

# ── Function CORS preflight ───────────────────────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
